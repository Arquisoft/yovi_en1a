name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}




    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - run: npm --prefix users ci
    - run: npm --prefix webapp ci
    - run: npm --prefix users run test:coverage
    - run: npm --prefix webapp run test:coverage
    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov --locked
    - name: Generate gamey code coverage
      run: cd gamey && cargo llvm-cov --lcov --output-path lcov.info
    - name: Normalize Rust coverage paths
      run: |
        sed -i "s|SF:${GITHUB_WORKSPACE}/|SF:|g" gamey/lcov.info
        grep '^SF:' gamey/lcov.info | head
    - name: Analyze with SonarQube
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  e2e:
    name: Run E2E tests
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    needs: [tests] # Wait for unit tests & coverage to pass first
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust compilation
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gamey

      - name: Install users dependencies
        run: |
          cd users
          npm ci

      - name: Install gameyapi dependencies
        run: |
          cd gameyapi
          npm ci

      - name: Install webapp dependencies
        run: |
          cd webapp
          npm ci

      - name: Install Playwright browsers
        run: |
          cd webapp
          npm run test:e2e:install-browsers

      - name: Compile Gamey (Rust Engine)
        run: |
          cd gamey
          cargo build --release

      - name: Start Gamey (Rust Engine)
        run: |
          cd gamey
          echo "Binary exists: $(ls -la ./target/release/gamey 2>&1)"
          ./target/release/gamey --mode server --port 4000 > /tmp/gamey.log 2>&1 &
          GAMEY_PID=$!
          echo "Gamey PID: $GAMEY_PID"
          sleep 2
          if ! kill -0 $GAMEY_PID 2>/dev/null; then
            echo "ERROR: Gamey process crashed immediately!"
            echo "=== Gamey Log ==="
            cat /tmp/gamey.log
            exit 1
          fi
          echo "Gamey process is running"
        
      - name: Run GameyAPI (Node Backend)
        env:
          MONGODB_URI: mongodb://localhost:27017/yovi
          GAMEY_RUST_URL: http://localhost:4000
        run: |
          cd gameyapi
          node gamey-service.js &

      - name: Run Users API
        env:
          MONGODB_URI: mongodb://localhost:27017/yovi
          ALLOWED_ORIGINS: http://localhost,http://localhost:5173,http://localhost:3000,http://127.0.0.1
        run: |
          cd users
          npm start &

      - name: Start Webapp
        run: |
          cd webapp
          npm run dev &
      
      - name: Wait for all services to be ready
        run: |
          echo "Waiting for Rust engine (port 4000)..."
          RUST_READY=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/status > /dev/null 2>&1; then
              RUST_READY=true
              break
            fi
            sleep 1
          done
          if [ "$RUST_READY" != "true" ]; then
            echo "ERROR: Rust engine did not respond within 30 seconds!"
            echo "=== Gamey Log ==="
            cat /tmp/gamey.log 2>/dev/null || echo "(no log file)"
            echo "=== Process Check ==="
            ps aux | grep gamey || true
            exit 1
          fi
          echo "✓ Rust engine ready"

          echo "Waiting for GameyAPI (port 3001)..."
          GAMEY_READY=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              GAMEY_READY=true
              break
            fi
            sleep 1
          done
          if [ "$GAMEY_READY" != "true" ]; then
            echo "ERROR: GameyAPI did not start within 30 seconds!"
            exit 1
          fi
          echo "✓ GameyAPI ready"

          echo "Waiting for Users API (port 3000)..."
          USERS_READY=false
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/ > /dev/null 2>&1; then
              USERS_READY=true
              break
            fi
            sleep 1
          done
          if [ "$USERS_READY" != "true" ]; then
            echo "ERROR: Users API did not start within 30 seconds!"
            exit 1
          fi
          echo "✓ Users API ready"

          echo "Waiting for Webapp (port 5173)..."
          WEBAPP_READY=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173/ > /dev/null 2>&1; then
              WEBAPP_READY=true
              break
            fi
            sleep 1
          done
          if [ "$WEBAPP_READY" != "true" ]; then
            echo "ERROR: Webapp did not start within 30 seconds!"
            exit 1
          fi
          echo "✓ Webapp ready"
          echo "All services ready!"

      - name: Run E2E Chromium
        run: |
          cd webapp
          BASE_URL=http://localhost:5173 BROWSER=chromium npm run test:e2e:run

      - name: Run E2E Firefox
        run: |
          cd webapp
          BASE_URL=http://localhost:5173 BROWSER=firefox npm run test:e2e:run

      - name: Run E2E WebKit
        run: |
          cd webapp
          BASE_URL=http://localhost:5173 BROWSER=webkit npm run test:e2e:run