name: Release — Test, Build, Publish, Deploy

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.event.release.tag_name }}

jobs:
  test-node:
    name: Run node unit tests
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.DEPLOY_JWT_SECRET }}




    strategy:
      matrix:
        service: [webapp, users]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          npm test

  test-rust:
    name: Run rust (gamey) tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: |
          cd gamey
          cargo test

  e2e:
    name: Run E2E tests
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    needs: [test-node, test-rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install users dependencies
        run: |
          cd users
          npm ci

      - name: Install gameyapi dependencies
        run: |
          cd gameyapi
          npm ci

      - name: Install webapp dependencies
        run: |
          cd webapp
          npm ci

      - name: Install Playwright browsers
        run: |
          cd webapp
          npm run test:e2e:install-browsers

      - name: Compile and run Gamey (Rust Engine)
        run: |
          cd gamey
          cargo run &
        
      - name: Run GameyAPI (Node Backend)
        env:
          MONGODB_URI: mongodb://localhost:27017/yovi
          GAMEY_RUST_URL: http://localhost:4000
        run: |
          cd gameyapi
          node gamey-service.js &

      - name: Run Users API
        env:
          MONGODB_URI: mongodb://localhost:27017/yovi
          ALLOWED_ORIGINS: http://localhost,http://localhost:5173,http://localhost:3000,http://127.0.0.1
        run: |
          cd users
          npm start &

      - name: Start Webapp
        run: |
          cd webapp
          npm run dev &
      
      # Wait a couple of seconds for all servers to bind to ports
      - name: Wait for services
        run: sleep 10

      - name: Run E2E Chromium
        run: |
          cd webapp
          BASE_URL=http://localhost:5173 BROWSER=chromium npm run test:e2e:run

      - name: Run E2E Firefox
        run: |
          cd webapp
          BASE_URL=http://localhost:5173 BROWSER=firefox npm run test:e2e:run

      - name: Run E2E WebKit
        run: |
          cd webapp
          BASE_URL=http://localhost:5173 BROWSER=webkit npm run test:e2e:run

  docker-push-users:
    name: Publish users image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (users)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-users
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: users

  docker-push-webapp:
    name: Publish webapp image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (webapp)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-webapp
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: webapp
          buildargs: VITE_API_URL=http://${{ secrets.DEPLOY_HOST }}:3000,
            VITE_GAMEY_URL=http://${{ secrets.DEPLOY_HOST }}:4000

  docker-push-gamey:
    name: Publish gamey image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (gamey)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gamey
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gamey

  docker-push-gameyapi:
    name: Publish gameyapi image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (gameyapi)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gameyapi
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gameyapi

  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs: [docker-push-users, docker-push-webapp, docker-push-gamey, docker-push-gameyapi]
    steps:
      - name: Deploy over SSH
        uses: fifsky/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          user: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command: |
            echo "JWT_SECRET=${{ secrets.DEPLOY_JWT_SECRET }}" > .env

            wget https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/master/docker-compose.yml -O docker-compose.yml
            docker compose down
            docker compose up -d --pull always

